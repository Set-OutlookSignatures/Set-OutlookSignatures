# This file defines which templates are to be used, which mailboxes receive a specific template, and which additional settings shall be applied
# See the 'Signature and OOF template file format' chapter at https://set-outlooksignatures.com/details for more details and enhanced usage examples

# Do not modify this file directly, but a copy of it.
# Place the copy in a separate folder structure recommended in the FAQ 'What is the recommended folder structure for script, license, template and config files?'
#   (https://set-outlooksignatures.com/faq#what-is-the-recommended-folder-structure-for-script-license-template-and-config-files)
# and use the 'OOFIniFile' parameter (https://set-outlooksignatures.com/parameters#oofinifile).

# Set-OutlookSignatures comes with an INI editor, which is also a validator and explainer:
# Run it locally via '.\sample code\IniEditor.html' or online via https://set-outlooksignatures.com/inieditor.

# The following is a special section, using an identifier that is not valid as a file name.
# SortOrder
#   Define the application order of templates within each template group (common, group specific, mailbox specific, replacement variabe specific)
#   The templates are applied from the first to the last entry of the sorted list
#   Default: AsInThisFile
#   Possible values: Ascending, asc, up, Descending, desc, down, AsInThisFile
# SortCulture
#   Define the culture used to sort the file list
#   Default: 127 (invariant)
#   Possible values: 127, de-AT, en-US, …
[<Set-OutlookSignatures configuration>]
SortOrder = AsInThisFile
SortCulture = 127

# Internal Out-of-Office reply, common
[Internal.htm]
Internal

# Internal Out-of-Office reply, for users without manager
[Internal no manager.htm]
-:$CurrentUserManagerMail$
Internal

# External Out-of-Office reply, common
[External.htm]
External

# External Out-of-Office reply, for users without manager
[External no manager.htm]
-:$CurrentUserManagerMail$
External

# Internal Out-of-Office reply, for Executive Office Board department
# Group could also be: <DNS or NetBIOS name of AD domain> Name-of-ExecutiveOfficeBoard-Group
[Internal Executive Office Board members.htm]
EntraID example-group@galactic.experiences
Internal

# External Out-of-Office reply, for Executive Office Board department
# Group could also be: EntraID Name-of-ExecutiveOfficeBoard-Group@galactic.experiences
[External Executive Office Board members.htm]
Example-AD-Domain Example-Group-Name
External
