# This file defines which templates are to be used, which mailboxes receive a specific template, and which additional settings shall be applied
# See the 'Signature and OOF template file format' chapter at https://set-outlooksignatures.com/details for more details and enhanced usage examples

# Do not modify this file directly, but a copy of it.
# Place the copy in a separate folder structure recommended in the FAQ 'What is the recommended folder structure for script, license, template and config files?'
#   (https://set-outlooksignatures.com/faq#what-is-the-recommended-folder-structure-for-script-license-template-and-config-files)
# and use the 'SignatureIniFile' parameter (https://set-outlooksignatures.com/parameters#signatureinifile).

# Set-OutlookSignatures comes with an INI editor, which is also a validator and explainer:
# Run it locally via '.\sample code\IniEditor.html' or online via https://set-outlooksignatures.com/inieditor.

# Consider using the 'VirtualMailboxConfigFile' parameter to add virtual mailboxes and dynamically create signature and out-of-office INI lines through code.
#   A sample scenario: Dynamically assign signatures for delegated mailboxes (such as for vacation replacements) by
#     1. Getting the permissions regularly through Export-RecipientPermissions (https://github.com/GruberMarkus/Export-RecipientPermissions)
#     2. Using 'VirtualMailboxConfigFile' to read these permissions and to assign signatures even if a user does not add the mailbox to Outlook.

# The following is a special section, using an identifier that is not valid as a file name.
# SortOrder
#   Define the application order of templates within each template group (common, group specific, mailbox specific, replacement variabe specific)
#   The templates are applied from the first to the last entry of the sorted list
#   Default: AsInThisFile
#   Possible values: Ascending, asc, up, Descending, desc, down, AsInThisFile
# SortCulture
#   Define the culture used to sort the file list
#   Default: 127 (invariant)
#   Possible values: 127, de-AT, en-US, …
[<Set-OutlookSignatures configuration>]
SortOrder = AsInThisFile
SortCulture = 127

# Informal signature, common
[Informal.docx]
defaultReplyFwd

# Formal signature, common
[Formal.docx]
defaultNew

# Test signature showing all default replacement variables
[Test all default replacement variables.docx]
-:alex.alien@galactic.experiences

# Formal signature, for HR department, default around the year
# Group could also be: EntraID Name-of-HR-Group@galactic.experiences
[Formal HR.docx]
OutlookSignatureName = Formal
Example-AD-Domain Name-of-HR-Group
defaultNew

# Formal signature, for HR department, Christmas season
# Group could also be: <DNS or NetBIOS name of AD domainName> Name-of-HR-Group
[Formal HR Christmas.docx]
OutlookSignatureName = Formal
202412100000-202501062359
202512100000-202601062359
202612100000-202701062359
202712100000-202801062359
202812100000-202901062359
202912100000-203001062359
203012100000-203101062359
EntraID Name-of-HR-Group@galactic.experiences
defaultNew

# Informal signature, delegate mailbox alex.alien@galactic.experiences
[Informal Delegate.docx]
OutlookSignatureName = Informal Delegate alex.alien
